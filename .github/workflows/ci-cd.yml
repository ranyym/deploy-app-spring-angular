name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests
        working-directory: springboot/app

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Tag Backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest springboot/app/

      - name: Build and Tag Frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest angular-app/

      - name: Push images to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      - name: Update Docker Compose with correct Username
        run: sed -i "s/nouran10/${{ secrets.DOCKERHUB_USERNAME }}/g" docker-compose.yml

      - name: Run docker-compose
        run: docker compose up -d

      - name: Check running containers
        run: docker ps
